name: Close inactive issues
on:
  schedule:
    - cron: "0 0 * * *"

jobs:
  close-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v10
        with:
          days-before-stale: 60
          days-before-close: 14
          exempt-all-labels: false
          exempt-issue-labels: pinned,security,bug,enhancement
          stale-issue-message: |
            This issue has been inactive for 60 days. It will be automatically closed in 14 days.
          close-issue-message: |
            This issue has been closed due to continued inactivity.
          stale-pr-message: |
            This PR has been inactive for 60 days. It will be automatically closed in 14 days.
          close-pr-message: |
            This PR has been closed due to continued inactivity.
